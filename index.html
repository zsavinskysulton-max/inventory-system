      <!DOCTYPE html>
      <html>
      <head>
    <meta charset="UTF-8">
    <title>Inventory</title>

    <link rel="stylesheet" href="css/style.css"> <!-- 🔥 PINDAH KE SINI -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
      <body>

      <div class="sidebar">
      <h2 class="logo">
      INVENTORY <br>
      <span>Kitchen & Laundry</span>
      <small>Waron Hospital</small>
    </h2>
      <button onclick="showPage('dashboard', this)">
      <i data-lucide="layout-dashboard"></i> Dashboard
    </button>

    <button onclick="showPage('master', this)">
      <i data-lucide="database"></i> Master
    </button>

    <button onclick="showPage('transaction', this)">
      <i data-lucide="repeat"></i> Transaction
    </button>
      </div>

      <div class="content">

    <!-- HEADER -->
    <div class="topbar">
      <div>
        <div id="currentDate"></div>
        <div id="currentTime" style="font-size:22px;font-weight:bold;"></div>
      </div>

    
    </div>

      <!-- DASHBOARD -->
      <div id="dashboardPage">
      <h1>Dashboard</h1>

      <div class="card">
      <p>Total Master: <span id="totalMaster"></span></p>
      <p>Total Transaction: <span id="totalTrans"></span></p>

      </div>

      <div class="chart-grid">

      <div class="chart-card">
      <!-- 🔽 DROPDOWN TARUH DI SINI -->
      <div class="chart-header">

    <!-- FILTER CATEGORY -->
    <select id="categoryFilter" onchange="renderAll()">
      <option value="all">All</option>
      <option value="Pantry">Pantry</option>
      <option value="Kitchen">Kitchen</option>
      <option value="Amenities">Amenities</option>
    </select>

    <!-- FILTER BULAN -->
    <select id="monthFilter" onchange="renderAll()">
      <option value="all">All Month</option>
      <option value="1">Jan</option>
      <option value="2">Feb</option>
      <option value="3">Mar</option>
      <option value="4">Apr</option>
      <option value="5">Mei</option>
      <option value="6">Jun</option>
      <option value="7">Jul</option>
      <option value="8">Agu</option>
      <option value="9">Sep</option>
      <option value="10">Okt</option>
      <option value="11">Nov</option>
      <option value="12">Des</option>
    </select>

    <!-- FILTER TANGGAL -->
    <input type="date" id="startDate" onchange="renderAll()">
    <input type="date" id="endDate" onchange="renderAll()">

  </div>
      <canvas id="chart"></canvas>
    </div>
      
    </div>
      <div class="card">
      <div class="export-bar">
        <button class="btn-export" onclick="exportToExcel()">Export Excel</button>
        <button class="btn-export" onclick="exportToCSV()">Export Google Sheet</button>
      </div>
      <table>
      <thead>
      <tr>
      <th>Code</th>
      <th>Name</th>
      <th>Stock</th>
      </tr>
      </thead>
      <tbody id="stockTable"></tbody>
      </table>
      </div>
      </div>

      <!-- MASTER -->
      <div id="masterPage" style="display:none">
      <h1>Master</h1>

      <div class="card form-row">
      <input id="name" placeholder="Nama Barang">
      <select id="category">
      <option>Pantry</option>
      <option>Kitchen</option>
      <option>Amenities</option>
      </select>
      <input id="min" type="number" placeholder="Min Stock">
      <button class="btn edit" onclick="addMaster()">+ Tambah</button>
      </div>

      <div class="card">
      <table>
      <thead>
      <tr>
      <th>Code</th>
      <th>Name</th>
      <th>Category</th>
      <th>Min</th>
      <th>Action</th>
      </tr>
      </thead>
      <tbody id="masterTable"></tbody>
      </table>
      </div>
      </div>

      <!-- TRANSACTION -->
      <div id="transactionPage" style="display:none">
      <h1>Transaction</h1>

      <div class="card form-row">
      <select id="itemSelect"></select>
      <select id="type">
      <option>IN</option>
      <option>OUT</option>
      </select>
      <input id="qty" type="number" placeholder="Qty">
      <button class="btn edit" onclick="addTransaction()">+ Tambah</button>
      </div>

      <div class="card">
      <table>
      <thead>
      <tr>
      <th>Code</th>
      <th>Name</th>
      <th>Type</th>
      <th>Qty</th>
      <th>Date</th>
      <th>Action</th>
      </tr>
      </thead>
      <tbody id="transTable"></tbody>
      </table>
      </div>
      </div>

      </div>
  <script src="js/script.js"></script>
      
      </body>
      </html>
