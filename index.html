<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#1e293b;
padding:20px;

height:100vh;        /* bikin full tinggi layar */
position:fixed;      /* biar nempel */
left:0;
top:0;
}

.sidebar h2{margin-bottom:20px;}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
  margin-left:240px; /* SESUAI LEBAR SIDEBAR */
}


/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

/* FORM */
.form-row{
display:flex;
gap:10px;
}

/* INPUT */
input, select{
background:#020617;
border:1px solid #334155;
color:white;
padding:8px;
border-radius:8px;
width:100%;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#334155;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #334155;
}

/* BUTTON */
.btn{
padding:6px 12px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.edit{background:#4f46e5;}
.delete{background:#ef4444;}
.save{background:#16a34a;}
.cancel{background:#475569;}

/* EDIT INPUT */
.edit-input{
background:#020617 !important;
border:1px solid #475569 !important;
color:white !important;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📦 Inventory</h2>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('master')">Master</button>
<button onclick="showPage('transaction')">Transaction</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage">
<h1>Dashboard</h1>

<div class="card">
<p>Total Master: <span id="totalMaster"></span></p>
<p>Total Transaction: <span id="totalTrans"></span></p>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
    <button class="btn edit" onclick="exportToExcel()">Export Excel</button>
<button class="btn edit" onclick="exportToCSV()">Export Google Sheet</button>
<table>
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Stock</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>
</div>

<!-- MASTER -->
<div id="masterPage" style="display:none">
<h1>Master</h1>

<div class="card form-row">
<input id="name" placeholder="Nama Barang">
<select id="category">
<option>Pantry</option>
<option>Kitchen</option>
</select>
<input id="min" type="number" placeholder="Min Stock">
<button class="btn edit" onclick="addMaster()">+ Tambah</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Category</th>
<th>Min</th>
<th>Action</th>
</tr>
</thead>
<tbody id="masterTable"></tbody>
</table>
</div>
</div>

<!-- TRANSACTION -->
<div id="transactionPage" style="display:none">
<h1>Transaction</h1>

<div class="card form-row">
<select id="itemSelect"></select>
<select id="type">
<option>IN</option>
<option>OUT</option>
</select>
<input id="qty" type="number" placeholder="Qty">
<button class="btn edit" onclick="addTransaction()">+ Tambah</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Code</th>
<th>Name</th>
<th>Type</th>
<th>Qty</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="transTable"></tbody>
</table>
</div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwhWZ2433PSZ8FXOf32CX_H208wUkAjvAR8E5JqrqHAstcX9UsbNAIg5vCN-2Xo0kA/exec";
let masterData = JSON.parse(localStorage.getItem("masterData")) || [];
let transactionData = JSON.parse(localStorage.getItem("transactionData")) || [];

async function loadDataFromAPI() {
  try {
    const masterRes = await fetch(API_URL + "?type=getMaster");
    const masterJson = await masterRes.json();

    const transRes = await fetch(API_URL + "?type=getTransaction");
    const transJson = await transRes.json();

    // skip header
    masterData = masterJson.slice(1).map(r => ({
      code: r[0],
      name: r[1],
      category: r[2],
      min: r[3],
      edit:false
    }));

    transactionData = transJson.slice(1).map(r => ({
      code: r[0],
      name: r[1],
      type: r[2],
      qty: r[3],
      date: r[4],
      edit:false
    }));

    renderAll();

  } catch (err) {
    console.error("ERROR:", err);
  }
}
function saveData(){
localStorage.setItem("masterData", JSON.stringify(masterData));
localStorage.setItem("transactionData", JSON.stringify(transactionData));
}
function prepareStockData(){
const stock = getStock();

let data = [];

Object.keys(stock).forEach(code=>{
data.push({
Code: code,
Name: stock[code].name,
Category: stock[code].category,
Stock: stock[code].qty
});
});

return data;
}
function exportToExcel(){
const data = prepareStockData();

let html = `
<table border="1">
<tr>
<th>Code</th>
<th>Name</th>
<th>Category</th>
<th>Stock</th>
</tr>
`;

data.forEach(d=>{
html += `
<tr>
<td>${d.Code}</td>
<td>${d.Name}</td>
<td>${d.Category}</td>
<td>${d.Stock}</td>
</tr>
`;
});

html += `</table>`;

let blob = new Blob([html], {type: "application/vnd.ms-excel"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "stock_inventory.xls";
a.click();
}
function exportToCSV(){
const data = prepareStockData();

let csv = "Code,Name,Category,Stock\n";

data.forEach(d=>{
csv += `${d.Code},${d.Name},${d.Category},${d.Stock}\n`;
});

let blob = new Blob([csv], {type: "text/csv"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "stock_inventory.csv";
a.click();
}
/* NAV */
function showPage(page){
document.getElementById("dashboardPage").style.display="none";
document.getElementById("masterPage").style.display="none";
document.getElementById("transactionPage").style.display="none";
document.getElementById(page+"Page").style.display="block";
renderAll();
}

/* MASTER */
function addMaster(){
const name = document.getElementById("name").value;
const category = document.getElementById("category").value;
const min = document.getElementById("min").value;

if(!name || !min) return alert("Isi dulu");

const code = "PAN" + (masterData.length+1).toString().padStart(3,"0");

/* SIMPAN KE GOOGLE SHEETS */
fetch(API_URL, {
method: "POST",
body: JSON.stringify({
type: "master",
code,
name,
category,
min
})
});

/* SIMPAN KE LOCAL (BIAR UI LANGSUNG UPDATE) */
masterData.push({code,name,category,min,edit:false});
saveData();
renderMaster();
}
function renderMaster(){
const table = document.getElementById("masterTable");
table.innerHTML="";

masterData.forEach((m,i)=>{
if(m.edit){
table.innerHTML += `
<tr>
<td>${m.code}</td>
<td><input class="edit-input" value="${m.name}" id="n${i}"></td>
<td>
<select class="edit-input" id="c${i}">
<option ${m.category=="Pantry"?"selected":""}>Pantry</option>
<option ${m.category=="Kitchen"?"selected":""}>Kitchen</option>
</select>
</td>
<td><input class="edit-input" value="${m.min}" id="m${i}"></td>
<td>
<button class="btn save" onclick="saveMaster(${i})">Save</button>
<button class="btn cancel" onclick="cancelMaster(${i})">Cancel</button>
</td>
</tr>`;
}else{
table.innerHTML += `
<tr>
<td>${m.code}</td>
<td>${m.name}</td>
<td>${m.category}</td>
<td>${m.min}</td>
<td>
<button class="btn edit" onclick="editMaster(${i})">Edit</button>
<button class="btn delete" onclick="deleteMaster(${i})">Delete</button>
</td>
</tr>`;
}
});

document.getElementById("totalMaster").innerText = masterData.length;
updateSelect();
}

function editMaster(i){masterData[i].edit=true; renderMaster();}
function cancelMaster(i){masterData[i].edit=false; renderMaster();}

function saveMaster(i){
masterData[i].name=document.getElementById("n"+i).value;
masterData[i].category=document.getElementById("c"+i).value;
masterData[i].min=document.getElementById("m"+i).value;
masterData[i].edit=false;
saveData();
renderMaster();
}

function deleteMaster(i){
masterData.splice(i,1);
saveData();
renderMaster();
}

/* TRANSACTION */
function addTransaction(){
const item = document.getElementById("itemSelect").value.split("|");
const type = document.getElementById("type").value;
const qty = document.getElementById("qty").value;

if(!qty) return alert("Isi qty");

/* KIRIM KE GOOGLE SHEETS */
fetch(API_URL, {
method: "POST",
body: JSON.stringify({
type: "transaction",
code:item[0],
name:item[1],
typeTrx:type,
qty
})
});

/* SIMPAN KE LOCAL */
transactionData.push({
code:item[0],
name:item[1],
type,
qty,
date:new Date().toLocaleString(),
edit:false
});

saveData();
renderTrans();
}

function renderTrans(){
const table = document.getElementById("transTable");
table.innerHTML="";

transactionData.forEach((t,i)=>{
if(t.edit){
table.innerHTML += `
<tr>
<td>${t.code}</td>
<td>${t.name}</td>
<td>
<select class="edit-input" id="t${i}">
<option ${t.type=="IN"?"selected":""}>IN</option>
<option ${t.type=="OUT"?"selected":""}>OUT</option>
</select>
</td>
<td><input class="edit-input" value="${t.qty}" id="q${i}"></td>
<td>${t.date}</td>
<td>
<button class="btn save" onclick="saveTrans(${i})">Save</button>
<button class="btn cancel" onclick="cancelTrans(${i})">Cancel</button>
</td>
</tr>`;
}else{
table.innerHTML += `
<tr>
<td>${t.code}</td>
<td>${t.name}</td>
<td>${t.type}</td>
<td>${t.qty}</td>
<td>${t.date}</td>
<td>
<button class="btn edit" onclick="editTrans(${i})">Edit</button>
<button class="btn delete" onclick="deleteTrans(${i})">Delete</button>
</td>
</tr>`;
}
});

document.getElementById("totalTrans").innerText = transactionData.length;
}

function editTrans(i){transactionData[i].edit=true; renderTrans();}
function cancelTrans(i){transactionData[i].edit=false; renderTrans();}

function saveTrans(i){
transactionData[i].type=document.getElementById("t"+i).value;
transactionData[i].qty=document.getElementById("q"+i).value;
transactionData[i].edit=false;
saveData();
renderTrans();
}

function deleteTrans(i){
transactionData.splice(i,1);
saveData();
renderTrans();
}

/* STOCK */
/* STOCK */
function getStock(){
let stock={};

masterData.forEach(m=>{
stock[m.code]={
name:m.name,
category:m.category, // 🔥 TAMBAH INI
qty:0
};
});

transactionData.forEach(t=>{
if(!stock[t.code]) return;
if(t.type=="IN") stock[t.code].qty+=Number(t.qty);
else stock[t.code].qty-=Number(t.qty);
});

return stock;
}

function renderStockTable(){
const table=document.getElementById("stockTable");
table.innerHTML="";

const stock=getStock();

/* 🔥 UBAH JADI ARRAY + SORT */
let stockArray = Object.keys(stock).map(code => ({
code,
name: stock[code].name,
category: stock[code].category,
qty: stock[code].qty
}));

/* 🔥 SORT BY CATEGORY */
stockArray.sort((a,b)=> a.category.localeCompare(b.category));

let currentCategory = "";

/* 🔥 LOOP */
stockArray.forEach(item=>{

/* 🔥 GROUP HEADER */
if(item.category !== currentCategory){
currentCategory = item.category;

table.innerHTML += `
<tr style="background:#0f172a;">
<td colspan="3"><b>${currentCategory}</b></td>
</tr>
`;
}

/* DATA */
table.innerHTML+=`
<tr>
<td>${item.code}</td>
<td>${item.name}</td>
<td>${item.qty}</td>
</tr>
`;
});

}
/* CHART */
let chart;
function renderChart(){
const stock=getStock();
const labels=[];
const data=[];

Object.keys(stock).forEach(code=>{
labels.push(stock[code].name);
data.push(stock[code].qty);
});

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{label:'Stock',data:data}]
}
});
}

/* SELECT */
function updateSelect(){
const select=document.getElementById("itemSelect");
select.innerHTML="";
masterData.forEach(m=>{
select.innerHTML+=`<option>${m.code}|${m.name}</option>`;
});
}

/* RENDER ALL */
function renderAll(){
renderMaster();
renderTrans();
renderStockTable();
renderChart();
}

/* INIT */
loadDataFromAPI();
</script>
</body>
</html>
